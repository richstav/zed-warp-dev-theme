# Warp Dark Theme - Kitty Terminal Configuration

# Main colors
background #000000
foreground #ffffff
cursor #00c2ff
cursor_text #000000

# Selection
selection_background #00c2ff2a
selection_foreground #ffffff

# ANSI Colors
color0 #616161
color1 #ff8272
color2 #b4fa72
color3 #fefdc2
color4 #a5d5fe
color5 #ff8ffd
color6 #d0d1fe
color7 #f1f1f1
color8 #8e8e8e
color9 #ffc4bd
color10 #b4fa72
color11 #fefdd5
color12 #c1e3fe
color13 #ffb1fe
color14 #e5e6fe
color15 #feffff

# Dimmed colors
color16 #3a3a3a
color17 #c06050
color18 #87bc55
color19 #bfbe92
color20 #7ca0bf
color21 #bf6bbe
color22 #9c9dbf
color23 #b0b0b0

# Tab bar colors
tab_bar_background #000000
tab_bar_active_tab_background #111111
tab_bar_active_tab_foreground #ffffff
tab_bar_inactive_tab_background #0a0a0a
tab_bar_inactive_tab_foreground #808080

# Window padding
window_padding_width 8

# Font
font_family JetBrains Mono, Fira Code, Cascadia Code, monospace
font_size 13
line_height 1.2

# Cursor
cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0

# Mouse
hide_mouse_when_typing yes

# Scrollback
scrollback_lines 10000

# Bell
bell_on_tab no
enable_audio_bell no

# URL highlighting
url_color #00c2ff
url_style single

# Marks
mark1_background #00c2ff2a
mark1_foreground #00c2ff

# Layout
remember_window_size no
initial_window_width 1280
initial_window_height 800

# Performance
repaint_delay 10
input_delay 0
sync_to_response no
