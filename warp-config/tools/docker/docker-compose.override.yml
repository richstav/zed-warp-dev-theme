# Warp Dark Theme - Docker Configuration

# Docker CLI configuration
# Place in ~/.docker/config.json

{
  "auths": {
    "https://index.docker.io/v1/": {}
  },
  "credsStore": "desktop",
  "currentContext": "default",
  "plugins": {
    "buildx": {
      "version": "0.12.0"
    },
    "compose": {
      "version": "2.20.0"
    }
  },
  "features": {
    "hooks": "true"
  },
  "builder": {
    "gc": {
      "enabled": true,
      "defaultKeepStorage": "20GB"
    }
  },
  "experimental": false,
  "cliPlugins": [
    "buildx",
    "compose"
  ]
}

# Docker Compose recommended overrides
# Add to docker-compose.yml under each service:

# services:
#   app:
#     labels:
#       - "com.warp.theme=active"
#     environment:
#       - TERM=xterm-256color
#     stdin_open: true
#     tty: true
